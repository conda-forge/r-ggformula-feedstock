{% set version = "1.0.1" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-ggformula
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/ggformula_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/ggformula/ggformula_{{ version }}.tar.gz
  sha256: cdb6a3c46491cfe550b61e859e58b270d4a6bc2bd12792fb6152c372a694e812

build:
  noarch: generic
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-ggiraph
    - r-ggplot2 >=3.3
    - r-ggridges
    - r-labelled
    - r-mosaiccore >=0.7.0
    - r-rlang
    - r-scales
    - r-stringr
    - r-tibble
  run:
    - r-base
    - r-ggiraph
    - r-ggplot2 >=3.3
    - r-ggridges
    - r-labelled
    - r-mosaiccore >=0.7.0
    - r-rlang
    - r-scales
    - r-stringr
    - r-tibble

test:
  commands:
    - $R -e "library('ggformula')"           # [not win]
    - "\"%R%\" -e \"library('ggformula')\""  # [win]

about:
  home: https://github.com/ProjectMOSAIC/ggformula
  license: MIT
  summary: Provides a formula interface to 'ggplot2' graphics.
  license_family: MIT
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/MIT
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r
    - philip-khor
